root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api.exe ./cmd/api"
  bin = "tmp\\api.exe"
  include_ext = ["go", "json"]
  include_dir = ["cmd", "internal", "pkg"]
  exclude_dir = ["tmp"]
  delay = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
